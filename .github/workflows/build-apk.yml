name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK 36
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-36" "build-tools;36.0.0" 2>/dev/null || true

      - name: Generate keystore (first time only)
        run: |
          if [ ! -f debug.keystore ]; then
            keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=LC,O=LC,C=CN"
            echo "KEYSTORE_GENERATED=true" >> $GITHUB_ENV
          else
            echo "Keystore already in repo"
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LoverConnect-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload keystore (first time only)
        if: env.KEYSTORE_GENERATED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: debug-keystore
          path: debug.keystore
