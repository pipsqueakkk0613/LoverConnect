name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK 36
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-36" "build-tools;36.0.0" 2>/dev/null || true

      - name: Generate keystore (once, then committed)
        run: |
          if [ ! -f debug.keystore ]; then
            keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=LC,O=LC,C=CN"
            echo "NEW_KEY=true" >> $GITHUB_ENV
            echo "Keystore generated"
          else
            echo "Keystore reused from repo"
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Commit keystore (first time only)
        if: env.NEW_KEY == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add debug.keystore
          git commit -m "chore: 固定签名keystore [skip ci]"
          git push

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LoverConnect-debug
          path: app/build/outputs/apk/debug/*.apk
